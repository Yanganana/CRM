name: consultant_crm
description: A corporate consultant CRM system built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  flutter_riverpod: ^2.4.9
  font_awesome_flutter: ^10.6.0
  syncfusion_flutter_maps: ^33.1.46
  file_picker: ^10.3.10
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/china.json
